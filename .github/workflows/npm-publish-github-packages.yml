# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
name: Titan Auto-Fuel (Scraper)

on:
  schedule:
    - cron: '0 0 * * *' # רץ כל יום בחצות שעון UTC
  workflow_dispatch: # מאפשר הרצה ידנית מכפתור בגיטהאב

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Fuel Pump (Scraper)
        run: npm run scrape
        
      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name 'Titan-AutoBot'
          git config --global user.email 'bot@titan.com'
          git add סיכוי.csv
          git commit -m "🤖 Auto-update: Injected new data to CSV" || exit 0
          git push
          
